services:
  watchtower:
    image: containrrr/watchtower:latest
    command:
      - "--label-enable"
      - "--interval"
      - "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  reverse-proxy:
    image: traefik:v3.1
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=carlotta@carl-otter.lol"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/carlotta/letsencrypt:/letsencrypt
    networks:
      - blackjack

  blackjack:
    image: stauberc/black-jack:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blackjack.rule=Host(`carl-otter.lol`)"
      - "traefik.http.routers.blackjack.entrypoints=websecure"
      - "traefik.http.services.blackjack.loadbalancer.server.port=3000"
      - "traefik.http.routers.blackjack.tls.certresolver=myresolver"
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://blackjack:JGP4Jcsh8mEtcyNJ0fJo@postgres:5432/blackjack
    depends_on:
      - postgres
    networks:
      blackjack:
        aliases:
          - blackjack

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=blackjack
      - POSTGRES_PASSWORD=JGP4Jcsh8mEtcyNJ0fJo
    networks:
      - blackjack
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - blackjack

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=tUEfXe2ZmpNgzeLsAKPdotTdd44MDi81K1x
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.carl-otter.lol`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - blackjack

networks:
  blackjack:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: